    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    h1 {
      margin: 24px 0 28px;
      font-size: 2rem;
      font-weight: 700;

      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .images a,
    .images img {

    .images img {

      height: auto;
      border: 0;
    }
