<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive AI stories</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    h1 {
      margin: 24px 0 28px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
    }

    .images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .images a,
    .images img {
      display: block;
    }

    .images img {
      max-width: min(90vw, 900px);
      height: auto;
      border: 0;
    }
  </style>
</head>
<body>
  <h1>Interactive AI stories</h1>

  <div class="images">
    <a href="URL_1"><img src="IMAGE_URL_1" alt="" /></a>
    <a href="URL_2"><img src="IMAGE_URL_2" alt="" /></a>
    <a href="URL_3"><img src="IMAGE_URL_3" alt="" /></a>
  </div>
</body>
</html>
